<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pilot - Racing Demo</title>
    
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>

    <style>
        html, body {
            overflow: hidden;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #000;
        }
        #renderCanvas {
            width: 100%;
            height: 100%;
            touch-action: none;
        }
    </style>
</head>
<body>

    <div id="loadingScreen" style="position: absolute; width: 100%; height: 100%; background: url('assets/tumblr_ec64faee2f3dc4fd4402ebea120f37ac_2be82019_1024.jpg') center/cover; z-index: 10; display: flex; justify-content: center; align-items: flex-end;">
        <h1 style="color: white; font-family: 'Impact', sans-serif; margin-bottom: 50px; text-shadow: 3px 3px 5px black; letter-spacing: 2px;">THE PILOT - CARREGANDO...</h1>
    </div>

    <canvas id="renderCanvas"></canvas>

    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);

        const createScene = function () {
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color4(0.05, 0.05, 0.1, 1);

            const camera = new BABYLON.ArcRotateCamera("camera", -Math.PI / 2, Math.PI / 2.5, 15, BABYLON.Vector3.Zero(), scene);
            camera.attachControl(canvas, true);

            const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
            light.intensity = 0.7;

            const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: 100, height: 100}, scene);
            const groundMaterial = new BABYLON.StandardMaterial("groundMat", scene);
            groundMaterial.diffuseColor = new BABYLON.Color3(0.2, 0.2, 0.2);
            groundMaterial.wireframe = true; 
            ground.material = groundMaterial;

            const adt = BABYLON.GUI.AdvancedDynamicTexture.CreateFullscreenUI("UI");
            const text = new BABYLON.GUI.TextBlock();
            text.text = "THE PILOT: MODO DESENVOLVEDOR";
            text.color = "cyan";
            text.fontSize = 24;
            text.top = "-40%";
            adt.addControl(text);

            return scene;
        };

        const scene = createScene();

        // COMANDO PARA TIRAR A TELA DE LOADING
        // Quando a cena terminar de renderizar o primeiro frame, a tela some após 2 segundos
        scene.executeWhenReady(function () {
            setTimeout(() => {
                document.getElementById("loadingScreen").style.display = "none";
            }, 2000); 
        });

        engine.runRenderLoop(function () {
            scene.render();
        });

        window.addEventListener("resize", function () {
            engine.resize();
        });
    </script>
</body>
</html>
